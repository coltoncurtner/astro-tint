<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thanks — Astro Tint Solutions</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0A0E15" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css?v=4" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <style>
    .thanks-wrap { min-height: 70vh; display: grid; place-items: center; text-align: center; padding: 80px 24px; }
    .thanks-wrap h1 { font-size: clamp(34px, 5vw, 54px); margin-bottom: 18px; }
    .thanks-wrap p { font-size: 20px; color: var(--ink-soft); max-width: 48ch; margin: 0 auto 28px; }
    .thanks-check { width: 72px; height: 72px; border-radius: 50%; background: var(--red-tint); color: var(--red); display: grid; place-items: center; font-size: 38px; margin: 0 auto 28px; }
    .thanks-call { display: block; margin-top: 18px; font-size: 16px; color: var(--ink-soft); }
    .thanks-call a { color: var(--red); font-weight: 600; }
  </style>
</head>
<body>
  <main class="thanks-wrap">
    <div>
      <div class="thanks-check" aria-hidden="true">&#10003;</div>
      <h1>Thanks — we&rsquo;ve got your request.</h1>
      <p>Your free quote request is in. We&rsquo;ll reach out by phone or email shortly — usually the same day — to confirm pricing and get you scheduled.</p>
      <a class="btn btn-primary btn-lg" href="/">Back to home</a>
      <span class="thanks-call">In a hurry? Call or text <a href="tel:+16303620909">(630) 362-0909</a>.</span>
    </div>
  </main>
</body>
</html>
